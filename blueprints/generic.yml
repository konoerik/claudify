name: Generic
description: Claude Code setup for any language or stack

# To apply this blueprint, tell Claude Code:
#   "Read and apply claudify/blueprints/generic.yml to this project."
#
# Claude will read each src file relative to the claudify root, then install it
# at dest relative to the target project root.
#
# Rules:
#   - All files are skipped if they already exist (never overwrites)
#   - executable: true  → chmod +x after creating
#   - setup steps run after all files are installed

files:

  # --- Project documents ---

  - src: files/docs/CLAUDE.md
    dest: CLAUDE.md

  - src: files/docs/CONTEXT.md
    dest: docs/CONTEXT.md

  - src: files/docs/PLAN.md
    dest: docs/PLAN.md

  - src: files/docs/ARCHITECTURE.md
    dest: docs/ARCHITECTURE.md

  - src: files/docs/ROADMAP.md
    dest: docs/ROADMAP.md

  - src: files/docs/claudify.md
    dest: .claude/claudify.md

  # --- Hooks ---

  - src: files/hooks/session-wrap.sh
    dest: .claude/hooks/stop/session-wrap.sh
    executable: true

  - src: files/hooks/guard-naming.sh
    dest: .claude/hooks/pre-tool-use/guard-naming.sh
    executable: true

  # --- Commands ---

  - src: files/commands/continue.md
    dest: .claude/commands/continue.md

  - src: files/commands/save.md
    dest: .claude/commands/save.md

  - src: files/commands/log.md
    dest: .claude/commands/log.md

  - src: files/commands/prep.md
    dest: .claude/commands/prep.md

  - src: files/commands/pulse.md
    dest: .claude/commands/pulse.md


setup:
  - mkdir: .claude/archive
  - gitignore: .claude/archive/
  - writefile: .claude/claudify
    content: "blueprint: generic"

next_steps:
  - Fill in CLAUDE.md — project overview, stack, conventions
  - Fill in ARCHITECTURE.md ## Quick Reference — stack, entry points, key constraints
  - Fill in CONTEXT.md — current focus and next action
